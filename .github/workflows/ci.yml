name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: List files
        run: ls -la
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Python version
        run: python --version
      - name: Install ruff
        run: pip install ruff && ruff --version
      - name: Lint
        run: ruff check cli.py
      - name: Format check
        run: ruff format --check cli.py
